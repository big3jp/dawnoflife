<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Main Body -->
    <path d="M50 15 C 85 15, 95 40, 75 80 C 60 95, 40 95, 25 80 C 5 40, 15 15, 50 15 Z" fill="rgba(255,50,50,0.4)" stroke="#ff3232" stroke-width="2"/>
    <!-- Inner Core -->
    <ellipse cx="50" cy="45" rx="15" ry="30" fill="rgba(255,0,0,0.6)" stroke="#ff0000" stroke-width="2"/>
    <!-- Spikes/Mandibles -->
    <path d="M35 15 L 25 5 M65 15 L 75 5" stroke="#ff3232" stroke-width="3" stroke-linecap="round"/>
    <path d="M25 40 L 10 35 M75 40 L 90 35" stroke="#ff3232" stroke-width="3" stroke-linecap="round"/>
    <path d="M22 60 L 5 65 M78 60 L 95 65" stroke="#ff3232" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="40" cy="30" r="4" fill="#ffeb3b"/>
    <circle cx="60" cy="30" r="4" fill="#ffeb3b"/>
    <circle cx="40" cy="30" r="1.5" fill="#000"/>
    <circle cx="60" cy="30" r="1.5" fill="#000"/>
  </g>
</svg>
